server.port=8889
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8101
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[1].id=production-order-service
spring.cloud.gateway.routes[1].uri=http://localhost:8102
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[2].id=machine-service
spring.cloud.gateway.routes[2].uri=http://localhost:8103
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/machines/**
spring.cloud.gateway.routes[3].id=quality-service
spring.cloud.gateway.routes[3].uri=http://localhost:8104
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/quality/**
spring.cloud.gateway.routes[4].id=maintenance-service
spring.cloud.gateway.routes[4].uri=http://localhost:8105
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/maintenance/**

smpps.jwt.secret=smpps-demo-secret-key-must-be-at-least-32-characters
smpps.jwt.issuer=smpps-api-gateway
smpps.jwt.expiration-minutes=120

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.home-page-url=http://localhost:${server.port}/login
eureka.instance.status-page-url=http://localhost:${server.port}/login

