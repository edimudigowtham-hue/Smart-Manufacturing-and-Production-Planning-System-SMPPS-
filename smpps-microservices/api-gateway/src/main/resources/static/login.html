<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Manufacturing & Production Planning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm border-0">
                <div class="row g-0">
                    <div class="col-md-5 login-hero text-white p-4 d-flex flex-column justify-content-center">
                        <h1 class="h3">🏭 SMPPS</h1>
                        <p class="mb-0">Smart Manufacturing & Production Planning System</p>
                        <p class="small text-white-50 mt-3">Sign in with your assigned manufacturing system account.</p>
                    </div>
                    <div class="col-md-7 p-4">
                        <h2 class="h4 text-primary mb-3">Login</h2>
                        <div id="login-message"></div>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input id="username" name="username" type="text" class="form-control" autocomplete="username" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
                            </div>
                            <button class="btn btn-primary w-100" type="submit">Sign in</button>
                        </form>
                        <p class="small text-muted text-center mt-3 mb-0">
                            Use the account assigned by the factory administrator.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    const params = new URLSearchParams(globalThis.location.search);
    const message = document.getElementById('login-message');
    const form = document.getElementById('login-form');

    if (params.has('logout') || params.has('expired')) {
        localStorage.removeItem('smppsToken');
    }

    if (params.has('error')) {
        message.innerHTML = '<div class="alert alert-danger">Invalid username or password.</div>';
    } else if (params.has('logout')) {
        message.innerHTML = '<div class="alert alert-success">You have been logged out.</div>';
    } else if (params.has('registration-disabled')) {
        message.innerHTML = '<div class="alert alert-info">Self-registration is disabled. Use your assigned factory account.</div>';
    } else if (params.has('expired')) {
        message.innerHTML = '<div class="alert alert-warning">Please sign in again.</div>';
    }

    form.addEventListener('submit', async event => {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
                throw new Error('Invalid username or password.');
            }

            const body = await response.json();
            localStorage.setItem('smppsToken', body.token);
            globalThis.location.href = '/dashboard';
        } catch (error) {
            message.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
        }
    });
</script>
</body>
</html>
