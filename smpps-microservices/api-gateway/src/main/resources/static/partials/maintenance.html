<section id="maintenance" class="page-section d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-primary">Maintenance Work Orders</h2>
        <button class="btn btn-outline-primary" data-refresh="maintenance">Refresh</button>
    </div>
    <div class="row g-3 mb-4" id="maintenance-summary-cards"></div>
    <form id="maintenance-form" class="card p-3 mb-4">
        <div class="row g-2">
            <div class="col-md-2"><select id="maintenanceMachineId" class="form-select" required></select></div>
            <div class="col-md-4"><select id="maintenanceType" class="form-select" required><option value="PREVENTIVE">PREVENTIVE</option><option value="BREAKDOWN">BREAKDOWN</option><option value="CALIBRATION">CALIBRATION</option></select></div>
            <div class="col-md-4"><input id="scheduledDate" type="date" class="form-control" title="Start Date" required></div>
            <div class="col-md-2 d-grid"><button class="btn btn-primary">Create</button></div>
        </div>
    </form>
    <div class="table-responsive"><table class="table table-bordered table-striped align-middle"><thead class="table-dark"><tr><th>ID</th><th>Machine</th><th>Type</th><th>Start Date</th><th>Completion Date</th><th>Technician</th><th>Spare</th><th>Status</th><th>Actions</th></tr></thead><tbody id="maintenance-table"></tbody></table></div>
</section>
