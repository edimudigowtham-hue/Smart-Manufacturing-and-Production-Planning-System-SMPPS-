<section id="quality" class="page-section d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-primary">Quality Inspection</h2>
        <button class="btn btn-outline-primary" data-refresh="quality">Refresh</button>
    </div>
    <div class="row g-3 mb-4" id="quality-summary-cards"></div>
    <form id="quality-form" class="card p-3 mb-4">
        <div class="row g-2">
            <div class="col-md-2"><select id="qualityOrderId" class="form-select" required></select></div>
            <div class="col-md-2"><input id="inspectionDate" type="date" class="form-control" required></div>
            <div class="col-md-2"><input id="sampleSize" type="number" min="1" class="form-control" placeholder="Sample Size" required></div>
            <div class="col-md-2"><input id="defectCount" type="number" min="0" class="form-control" placeholder="Defects" required></div>
            <div class="col-md-2 d-grid"><button class="btn btn-primary">Submit Inspection</button></div>
        </div>
    </form>
    <div class="table-responsive"><table class="table table-bordered table-striped align-middle"><thead class="table-dark"><tr><th>ID</th><th>Order</th><th>Date</th><th>Sample</th><th>Defects</th><th>Type</th><th>Severity</th><th>Description</th><th>Result</th><th>Actions</th></tr></thead><tbody id="quality-table"></tbody></table></div>
</section>
